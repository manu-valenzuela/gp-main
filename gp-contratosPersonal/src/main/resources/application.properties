spring.application.name=contratosPersonal

# Puerto del servidor
server.port=8088

# Configuración de base de datos (ajusta según tu entorno)
spring.datasource.url=jdbc:mysql://localhost:3306/contratos_personal
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs
logging.level.root=INFO
logging.level.com.gp.contratosPersonal=DEBUG
logging.file.name=logs/contratosPersonal.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n