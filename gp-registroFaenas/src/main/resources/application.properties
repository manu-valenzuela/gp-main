spring.application.name=registroFaenas

# Puerto asignado
server.port=8087

# Configuración de base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_personal
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.springframework=INFO
logging.level.com.gp.registroFaenas=DEBUG

# Feign Client (para integración con microservicio de direcciones)
spring.cloud.openfeign.client.config.default.loggerLevel=basic